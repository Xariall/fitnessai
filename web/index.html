<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitAgent — AI Фитнес-тренер</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <span class="logo">🏋️</span>
                <h1>FitAgent</h1>
            </div>
            <div class="header-right">
                <button id="profileBtn" class="btn-icon" title="Профиль">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
            </div>
        </header>

        <main class="chat" id="chat">
            <div class="message assistant">
                <div class="message-content">
                    <p>Привет! Я <strong>FitAgent</strong> — твой AI фитнес-тренер. Вот что я умею:</p>
                    <ul>
                        <li>📋 Составлять программы тренировок</li>
                        <li>📝 Записывать тренировки и вес</li>
                        <li>🍽️ Вести дневник питания</li>
                        <li>📸 Считать калории по фото еды</li>
                        <li>📊 Показывать прогресс</li>
                    </ul>
                    <p>Просто напиши, чем могу помочь!</p>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-row">
                <label class="btn-icon attach-btn" title="Прикрепить фото еды">
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </label>
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Напиши сообщение..." rows="1"></textarea>
                    <div id="imagePreview" class="image-preview hidden">
                        <img id="previewImg" src="" alt="preview">
                        <div class="image-meta">
                            <input type="number" id="weightInput" placeholder="Вес порции (г)" value="300" min="1">
                            <button id="removeImage" class="btn-remove">&times;</button>
                        </div>
                    </div>
                </div>
                <button id="sendBtn" class="btn-send" title="Отправить">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </footer>

        <!-- Profile modal -->
        <div id="profileModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Профиль</h2>
                    <button class="btn-close" id="closeProfile">&times;</button>
                </div>
                <form id="profileForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" name="name" placeholder="Имя">
                        </div>
                        <div class="form-group">
                            <label>Возраст</label>
                            <input type="number" name="age" placeholder="25" min="10" max="100">
                        </div>
                        <div class="form-group">
                            <label>Рост (см)</label>
                            <input type="number" name="height" placeholder="175" min="100" max="250">
                        </div>
                        <div class="form-group">
                            <label>Вес (кг)</label>
                            <input type="number" name="weight" placeholder="75" min="30" max="300" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>Пол</label>
                            <select name="gender">
                                <option value="">—</option>
                                <option value="male">Мужской</option>
                                <option value="female">Женский</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Активность</label>
                            <select name="activity">
                                <option value="">—</option>
                                <option value="sedentary">Сидячий образ жизни</option>
                                <option value="moderate">Лёгкая активность</option>
                                <option value="active">Умеренная активность</option>
                                <option value="athlete">Высокая активность</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Цель</label>
                            <select name="goal">
                                <option value="">—</option>
                                <option value="lose">Похудение</option>
                                <option value="maintain">Поддержание</option>
                                <option value="gain">Набор массы</option>
                                <option value="recomposition">Рекомпозиция</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
